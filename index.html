<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bot Forex Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
</head>
<body>
  <h1>Bot Forex Dashboard</h1>
  <select id="pairSelector"></select>
  <p id="signal"></p>
  <canvas id="chart" width="800" height="400"></canvas>

  <script>
    const PAIRS = ["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","USD/CHF","NZD/USD"];
    const selector = document.getElementById("pairSelector");
    PAIRS.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p;
      opt.textContent = p;
      selector.appendChild(opt);
    });

    async function loadPair(pair) {
      const res = await fetch(`/data/${pair}`);
      const data = await res.json();

      document.getElementById("signal").innerText = `Señal actual: ${data.signal}`;

      const values = data.values.map(v => ({
        x: new Date(v.datetime),
        o: parseFloat(v.open),
        h: parseFloat(v.high),
        l: parseFloat(v.low),
        c: parseFloat(v.close)
      }));

      new Chart(document.getElementById("chart"), {
        type: "candlestick",
        data: {
          datasets: [{ label: pair, data: values }]
        }
      });
    }

    selector.addEventListener("change", e => loadPair(e.target.value));
    loadPair(PAIRS[0]);
  </script>
</body>
</html>
