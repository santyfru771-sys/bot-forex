<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bot Forex Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
</head>
<body>
  <h1>Bot Forex Dashboard</h1>
  <select id="pairSelector"></select>
  <p id="signal"></p>
  <canvas id="chart" width="800" height="400"></canvas>

  <script>
    const PAIRS = ["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","USD/CHF","NZD/USD"];
    const selector = document.getElementById("pairSelector");
    PAIRS.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p;
      opt.textContent = p;
      selector.appendChild(opt);
    });

    async function loadPair(pair) {
      const [base, quote] = pair.split("/");
      const res = await fetch(`/data/${base}/${quote}`);
      const data = await res.json();

      // Mostrar último cierre
      const ultimo = data.values[0];
      document.getElementById("signal").innerText = `Último cierre: ${ultimo.close}`;

      // Convertir datos a formato candlestick
      const values = data.values.map(v => ({
        x: new Date(v.datetime),
        o: parseFloat(v.open),
        h: parseFloat(v.high),
        l: parseFloat(v.low),
        c: parseFloat(v.close)
      }));

      // Calcular SMA de 5 períodos
      const sma = [];
      for (let i = 4; i < values.length; i++) {
        const slice = values.slice(i - 4, i + 1);
        const avg = slice.reduce((sum, v) => sum + v.c, 0) / slice.length;
        sma.push({ x: values[i].x, y: avg });
      }

      // Dibujar gráfico con velas + SMA
      new Chart(document.getElementById("chart"), {
        type: "candlestick",
        data: {
          datasets: [
            { label: pair, data: values },
            { label: "SMA (5)", type: "line", data: sma, borderColor: "blue", borderWidth: 2 }
          ]
        }
      });
    }

    selector.addEventListener("change", e => loadPair(e.target.value));
    loadPair(PAIRS[0]);
  </script>
</body>
</html>
